<div [ngClass]="classes()">
  <label class="tn-checkbox__label" tnTestIdType="checkbox" [for]="id" [tnTestId]="resolvedTestId()">
    <!-- stopPropagation: the bubbling native change would reach ancestor (change)
         bindings in addition to the component's `change` output, firing them twice
         per toggle — the output is the single public event. -->
    <input
      #checkboxEl
      type="checkbox"
      class="tn-checkbox__input"
      [id]="id"
      [checked]="effectiveChecked()"
      [disabled]="isDisabled()"
      [required]="required()"
      [indeterminate]="indeterminate()"
      [attr.aria-label]="hasProjectedLabel() || hideLabel() ? (label() | tnLabelText) : null"
      [attr.aria-describedby]="error() ? id + '-error' : null"
      [attr.aria-invalid]="error() ? 'true' : null"
      (change)="onCheckboxChange($event); $event.stopPropagation()"
    />
    <span class="tn-checkbox__checkmark"></span>
    @if (!hideLabel()) {
      <span class="tn-checkbox__text">
        @if (hasProjectedLabel()) {
          <ng-content select="[tnCheckboxLabel]" />
        } @else {
          <span [innerHTML]="label() | tnLabelMarkup"></span>
        }
      </span>
    }
  </label>

  @if (error()) {
    <div
      class="tn-checkbox__error"
      role="alert"
      aria-live="polite"
      [id]="id + '-error'"
    >
      {{ error() }}
    </div>
  }
</div>
