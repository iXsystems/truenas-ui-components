@if (scrollWindow()) {
  <cdk-virtual-scroll-viewport
    scrollWindow
    [itemSize]="itemSize()"
    [minBufferPx]="minBufferPx()"
    [maxBufferPx]="maxBufferPx()"
  >
    <ng-container *cdkVirtualFor="let item of nodes$ | async; trackBy: innerTrackBy()">
      <ng-template tnTreeVirtualScrollNodeOutlet [data]="item" />
    </ng-container>
  </cdk-virtual-scroll-viewport>
} @else {
  <cdk-virtual-scroll-viewport
    class="tn-tree-virtual-scroll-view__viewport"
    [itemSize]="itemSize()"
    [minBufferPx]="minBufferPx()"
    [maxBufferPx]="maxBufferPx()"
  >
    <ng-container *cdkVirtualFor="let item of nodes$ | async; trackBy: innerTrackBy()">
      <ng-template tnTreeVirtualScrollNodeOutlet [data]="item" />
    </ng-container>
  </cdk-virtual-scroll-viewport>
}

<!-- Required so CdkTree finds a node outlet during init, but intentionally left
     empty: rows are rendered through the virtual scroll viewport above, not here. -->
<ng-container cdkTreeNodeOutlet />

@if (isScrollTopButtonVisible) {
  <tn-icon-button
    name="arrow-up"
    library="mdi"
    class="tn-tree-virtual-scroll-view__scroll-top"
    testId="scroll-to-top"
    [class.tn-tree-virtual-scroll-view__scroll-top--fixed]="scrollWindow()"
    [ariaLabel]="scrollToTopLabel()"
    [tooltip]="scrollToTopLabel()"
    (onClick)="scrollToTop()"
  />
}
