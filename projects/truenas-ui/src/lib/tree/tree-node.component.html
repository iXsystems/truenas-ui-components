<!-- The `role="treeitem"` (plus aria-level/aria-expanded) lives on the host
     `.tn-tree-node-wrapper`, so this inner div is a presentational container —
     no role or aria-* here, to avoid exposing a second, nested treeitem to AT. -->
<div class="tn-tree-node"
     cdkTreeNodeToggle
     [class.tn-tree-node--expandable]="isExpandable"
     [style.cursor]="isExpandable ? 'pointer' : 'default'">
  
  <div class="tn-tree-node__content">
    <!-- Arrow icon for expandable nodes -->
    @if (isExpandable) {
      <div
        class="tn-tree-node__toggle"
        [class.tn-tree-node__toggle--expanded]="isExpanded">
        <tn-icon
          library="mdi"
          size="sm"
          style="transition: transform 0.2s ease;"
          [name]="isExpanded ? 'chevron-down' : 'chevron-right'" />
      </div>
    }

    <!-- Spacer for non-expandable nodes -->
    @if (!isExpandable) {
      <div class="tn-tree-node__spacer"></div>
    }
    
    <!-- Node content -->
    <div class="tn-tree-node__text">
      <ng-content />
    </div>
  </div>
</div>
