<div class="tn-nested-tree-node__content">
  @if (!hideToggle()) {
    <!-- Toggle button for expandable nodes (provided by component).
         Alt+click / Alt+Enter toggles the node together with all descendants.
         tabindex="-1" keeps it out of the tab order — the tree's key manager
         drives focus at the treeitem level, matching cdkTreeNodeToggle. -->
    @if (isExpandable) {
      <button
        class="tn-nested-tree-node__toggle"
        type="button"
        tabindex="-1"
        tnTestIdType="button"
        [tnTestId]="resolvedToggleTestId()"
        [class.tn-nested-tree-node__toggle--expanded]="isExpanded"
        [attr.aria-label]="toggleAriaLabel()"
        (click)="toggleNode($event); $event.stopPropagation()"
        (keydown.enter)="toggleNode($event); $event.preventDefault()"
        (keydown.space)="toggleNode($event); $event.preventDefault()">
        <tn-icon
          library="mdi"
          size="sm"
          style="transition: transform 0.2s ease;"
          [name]="isExpanded ? 'chevron-down' : 'chevron-right'" />
      </button>
    }

    <!-- Spacer for non-expandable nodes to maintain alignment -->
    @if (!isExpandable) {
      <div class="tn-nested-tree-node__spacer"></div>
    }
  }

  <!-- Consumer content -->
  <ng-content />
</div>

<!-- Children container -->
@if (isExpandable) {
  <div class="tn-nested-tree-node-container" role="group" [class.tn-tree-invisible]="!isExpanded">
    <ng-content select="[slot=children]" />
  </div>
}
