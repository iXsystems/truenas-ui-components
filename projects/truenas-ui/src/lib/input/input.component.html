<div
  class="tn-input-container"
  [class.tn-input-container--has-prefix]="hasPrefixIcon()"
  [class.tn-input-container--has-suffix]="hasSuffixIcon() || hasPasswordToggle()"
>
  <!-- Prefix icon -->
  @if (hasPrefixIcon()) {
    <tn-icon
      class="tn-input__prefix-icon"
      size="sm"
      aria-hidden="true"
      [name]="prefixIcon()!"
      [library]="prefixIconLibrary()"
    />
  }

  <!-- Regular input field -->
  @if (!showTextarea()) {
    <input
      #inputEl
      class="tn-input"
      tnTestIdType="input"
      [id]="id"
      [value]="value"
      [type]="resolvedType()"
      [attr.inputmode]="numericInputMode()"
      [attr.aria-label]="ariaLabel()"
      [attr.placeholder]="placeholder()"
      [attr.autocomplete]="autocomplete()"
      [attr.name]="name()"
      [tnTestId]="testId()"
      [disabled]="isDisabled()"
      [readonly]="readonly()"
      [required]="required()"
      (input)="onValueChange($event)"
      (blur)="onBlur()"
    />
  }

  <!-- Textarea field -->
  @if (showTextarea()) {
    <textarea
      #inputEl
      class="tn-input tn-textarea"
      tnTestIdType="textarea"
      [id]="id"
      [value]="value"
      [attr.aria-label]="ariaLabel()"
      [attr.placeholder]="placeholder()"
      [attr.autocomplete]="autocomplete()"
      [attr.name]="name()"
      [tnTestId]="testId()"
      [rows]="rows()"
      [disabled]="isDisabled()"
      [readonly]="readonly()"
      [required]="required()"
      (input)="onValueChange($event)"
      (blur)="onBlur()"
    ></textarea>
  }

  <!-- Suffix icon action button -->
  @if (hasSuffixIcon()) {
    <button
      type="button"
      class="tn-input__suffix-action"
      tnTestIdType="button"
      [tnTestId]="suffixActionTestId()"
      [attr.aria-label]="suffixIconAriaLabel()"
      [disabled]="isDisabled()"
      (click)="onSuffixAction.emit($event)"
    >
      <tn-icon
        size="sm"
        [name]="suffixIcon()!"
        [library]="suffixIconLibrary()"
      />
    </button>
  }

  <!-- Password visibility toggle. State is conveyed via the swapping
       aria-label alone — no aria-pressed, which would contradict a label that
       already names the action ("Hide password, pressed" is ambiguous). -->
  @if (hasPasswordToggle()) {
    <button
      type="button"
      class="tn-input__visibility-toggle"
      tnTestIdType="button"
      [tnTestId]="passwordToggleTestId()"
      [attr.aria-label]="passwordVisible() ? 'Hide password' : 'Show password'"
      [disabled]="isDisabled()"
      (click)="togglePasswordVisibility()"
    >
      <tn-icon size="sm" aria-hidden="true" [name]="passwordToggleIcon()" />
    </button>
  }
</div>
