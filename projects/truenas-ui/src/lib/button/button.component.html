<ng-template #content>
  @if (icon() && iconPosition() === 'left') {
    <tn-icon class="storybook-button__icon" size="sm" aria-hidden="true" [name]="icon()!" />
  }
  <span class="storybook-button__label" [innerHTML]="label() | tnLabelMarkup"></span>
  @if (icon() && iconPosition() === 'right') {
    <tn-icon class="storybook-button__icon" size="sm" aria-hidden="true" [name]="icon()!" />
  }
</ng-template>

@if (isRouterLink()) {
  <a
    #button
    tnTestIdType="button"
    [ngClass]="classes()"
    [ngStyle]="{ 'background-color': backgroundColor() }"
    [routerLink]="disabled() ? null : routerLink()"
    [queryParams]="queryParams()"
    [fragment]="fragment()"
    [target]="target()"
    [rel]="rel()"
    [attr.aria-disabled]="disabled() ? 'true' : null"
    [attr.aria-label]="ariaLabel()"
    [attr.tabindex]="disabled() ? -1 : null"
    [class.is-disabled]="disabled()"
    [tnTestId]="testId()"
    (click)="handleAnchorClick($event)"
  >
    <ng-container [ngTemplateOutlet]="content" />
  </a>
} @else if (isAnchor()) {
  <a
    #button
    tnTestIdType="button"
    [ngClass]="classes()"
    [ngStyle]="{ 'background-color': backgroundColor() }"
    [attr.href]="disabled() ? null : href()"
    [target]="target()"
    [rel]="rel()"
    [attr.aria-disabled]="disabled() ? 'true' : null"
    [attr.aria-label]="ariaLabel()"
    [attr.tabindex]="disabled() ? -1 : null"
    [class.is-disabled]="disabled()"
    [tnTestId]="testId()"
    (click)="handleAnchorClick($event)"
  >
    <ng-container [ngTemplateOutlet]="content" />
  </a>
} @else {
  <button
    #button
    tnTestIdType="button"
    [attr.type]="type()"
    [ngClass]="classes()"
    [ngStyle]="{ 'background-color': backgroundColor() }"
    [disabled]="disabled()"
    [attr.aria-label]="ariaLabel()"
    [tnTestId]="testId()"
    (click)="onClick.emit($event)"
  >
    <ng-container [ngTemplateOutlet]="content" />
  </button>
}
