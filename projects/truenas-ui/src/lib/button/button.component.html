@if (isRouterLink()) {
  <a
    #button
    tnTestIdType="button"
    [ngClass]="classes()"
    [ngStyle]="{ 'background-color': backgroundColor() }"
    [routerLink]="disabled() ? null : routerLink()"
    [queryParams]="queryParams()"
    [fragment]="fragment()"
    [target]="target()"
    [rel]="rel()"
    [attr.aria-disabled]="disabled() ? 'true' : null"
    [attr.aria-label]="ariaLabel()"
    [attr.tabindex]="disabled() ? -1 : null"
    [class.is-disabled]="disabled()"
    [tnTestId]="testId()"
    (click)="handleAnchorClick($event)"
  >
    @if (icon(); as iconName) {
      <tn-icon
        class="button-icon"
        size="sm"
        aria-hidden="true"
        [name]="iconName"
        [library]="iconLibrary()"
      />
    }
    <span [innerHTML]="label() | tnLabelMarkup"></span>
  </a>
} @else if (isAnchor()) {
  <a
    #button
    tnTestIdType="button"
    [ngClass]="classes()"
    [ngStyle]="{ 'background-color': backgroundColor() }"
    [attr.href]="disabled() ? null : href()"
    [target]="target()"
    [rel]="rel()"
    [attr.aria-disabled]="disabled() ? 'true' : null"
    [attr.aria-label]="ariaLabel()"
    [attr.tabindex]="disabled() ? -1 : null"
    [class.is-disabled]="disabled()"
    [tnTestId]="testId()"
    (click)="handleAnchorClick($event)"
  >
    @if (icon(); as iconName) {
      <tn-icon
        class="button-icon"
        size="sm"
        aria-hidden="true"
        [name]="iconName"
        [library]="iconLibrary()"
      />
    }
    <span [innerHTML]="label() | tnLabelMarkup"></span>
  </a>
} @else {
  <button
    #button
    tnTestIdType="button"
    [attr.type]="type()"
    [ngClass]="classes()"
    [ngStyle]="{ 'background-color': backgroundColor() }"
    [disabled]="disabled()"
    [attr.aria-label]="ariaLabel()"
    [tnTestId]="testId()"
    (click)="onClick.emit($event)"
  >
    @if (icon(); as iconName) {
      <tn-icon
        class="button-icon"
        size="sm"
        aria-hidden="true"
        [name]="iconName"
        [library]="iconLibrary()"
      />
    }
    <span [innerHTML]="label() | tnLabelMarkup"></span>
  </button>
}
