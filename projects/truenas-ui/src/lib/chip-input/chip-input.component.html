<!-- Click-to-focus is a pointer affordance only; keyboard users Tab straight to
     the real <input> inside, so the container itself is not a focus target. -->
<!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
<div
  #container
  class="tn-chip-input"
  [class.tn-chip-input--disabled]="isDisabled()"
  (click)="focusInput()"
>
  @for (value of values(); track $index) {
    <tn-chip
      class="tn-chip-input__chip"
      color="secondary"
      [label]="displayLabel(value)"
      [closable]="!isDisabled()"
      [disabled]="isDisabled()"
      [testId]="chipTestId(value)"
      (onClose)="removeChip($index)"
    />
  }

  <input
    #inputEl
    type="text"
    class="tn-chip-input__field"
    role="combobox"
    autocomplete="off"
    tnTestIdType="chip-input"
    [tnTestId]="testId()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled()"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-labelledby]="fieldAria.labelledby()"
    [attr.aria-describedby]="fieldAria.describedby()"
    [attr.aria-invalid]="fieldAria.invalid()"
    [attr.aria-required]="fieldAria.required()"
    [attr.aria-autocomplete]="'list'"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-controls]="isOpen() ? uid + '-listbox' : null"
    [attr.aria-activedescendant]="highlightedIndex() >= 0 ? uid + '-option-' + highlightedIndex() : null"
    (input)="onInput($event)"
    (focus)="onFocus()"
    (blur)="onBlur()"
    (keydown)="onKeydown($event)"
  />
</div>

<!-- Suggestion dropdown — portaled via CDK overlay so it escapes ancestor
     overflow/clipping. Attach/detach is driven by open()/close(). -->
<ng-template #dropdownTemplate>
  <div
    class="tn-chip-input__dropdown"
    role="listbox"
    [attr.id]="uid + '-listbox'"
  >
    @for (suggestion of filteredSuggestions(); track $index) {
      <!-- Options are tabindex="-1" and never focused: keyboard selection goes
           through the input's aria-activedescendant + the Enter branch in
           onKeydown, so a key handler here would be dead code. Click is a
           pointer-only affordance. -->
      <!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events -->
      <div
        class="tn-chip-input__option"
        role="option"
        tabindex="-1"
        tnTestIdType="option"
        [tnTestId]="chipTestId(suggestion.value)"
        [class.highlighted]="highlightedIndex() === $index"
        [attr.id]="uid + '-option-' + $index"
        [attr.aria-selected]="highlightedIndex() === $index"
        (mousedown)="onSuggestionMousedown($event)"
        (click)="onSuggestionClick(suggestion)"
      >
        {{ suggestion.label }}
      </div>
    }
  </div>
</ng-template>
