<button
  #button
  type="button"
  tnTestIdType="button"
  [ngClass]="classes()"
  [disabled]="disabled()"
  [attr.aria-label]="effectiveAriaLabel()"
  [attr.aria-expanded]="ariaExpanded()"
  [tnTestId]="testId()"
  [tnTooltip]="tooltip() || ''"
  [tnTooltipPosition]="tooltipPosition()"
  (click)="onClick.emit($event)"
>
  <tn-icon
    [name]="name()"
    [size]="size()"
    [color]="color()"
    [library]="library()"
    [ngClass]="iconClass()"
    [ariaLabel]="effectiveAriaLabel()" />
  <ng-content />
</button>
