<div [ngClass]="classes()">
  <label class="tn-radio__label" tnTestIdType="radio" [for]="id" [tnTestId]="resolvedTestId()">
    <!-- stopPropagation: the bubbling native change would reach ancestor (change)
         bindings in addition to the component's `change` output, firing them twice
         per toggle — the output is the single public event. -->
    <input
      #radioEl
      type="radio"
      class="tn-radio__input"
      [id]="id"
      [name]="name()"
      [value]="value()"
      [checked]="checked"
      [disabled]="isDisabled()"
      [required]="required()"
      [attr.aria-describedby]="error() ? id + '-error' : null"
      [attr.aria-invalid]="error() ? 'true' : null"
      (change)="onRadioChange($event); $event.stopPropagation()"
    />
    <span class="tn-radio__checkmark"></span>
    <span class="tn-radio__text" [innerHTML]="label() | tnLabelMarkup"></span>
  </label>

  @if (error()) {
    <div
      class="tn-radio__error"
      role="alert"
      aria-live="polite"
      [id]="id + '-error'"
    >
      {{ error() }}
    </div>
  }
</div>
