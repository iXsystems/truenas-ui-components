@if (item().separator) {
  <div class="tn-menu-separator" role="separator"></div>
} @else if (!item().children || item().children!.length === 0) {
  <!-- eslint-disable-next-line tn-local/require-tn-testid-type -- full id composed in TS via resolvedTestId() -->
  <button
    cdkMenuItem
    class="tn-menu-item"
    type="button"
    [tnTestId]="resolvedTestId()"
    [disabled]="item().disabled"
    [cdkMenuItemDisabled]="!!item().disabled"
    [class.disabled]="item().disabled"
    [class.tn-menu-item--selected]="item().selected"
    [attr.aria-current]="item().selected ? 'true' : null"
    (click)="onClick()"
  >
    @if (item().icon) {
      <tn-icon size="sm" class="tn-menu-item-icon" [name]="item().icon!" [library]="item().iconLibrary" />
    }
    <span class="tn-menu-item-label">{{ item().label }}</span>
    @if (item().shortcut) {
      <span class="tn-menu-item-shortcut">{{ item().shortcut }}</span>
    }
  </button>
} @else {
  <!-- eslint-disable-next-line tn-local/require-tn-testid-type -- full id composed in TS via resolvedTestId() -->
  <button
    cdkMenuItem
    class="tn-menu-item tn-menu-item--nested"
    type="button"
    [tnTestId]="resolvedTestId()"
    [cdkMenuTriggerFor]="submenuTpl"
    [disabled]="item().disabled"
    [cdkMenuItemDisabled]="!!item().disabled"
    [class.disabled]="item().disabled"
    [class.tn-menu-item--selected]="item().selected"
    [attr.aria-current]="item().selected ? 'true' : null"
  >
    @if (item().icon) {
      <tn-icon size="sm" class="tn-menu-item-icon" [name]="item().icon!" [library]="item().iconLibrary" />
    }
    <span class="tn-menu-item-label">{{ item().label }}</span>
    @if (item().shortcut) {
      <span class="tn-menu-item-shortcut">{{ item().shortcut }}</span>
    }
    <span class="tn-menu-item-arrow">▶</span>
  </button>

  <ng-template #submenuTpl>
    <div class="tn-menu tn-menu--nested" cdkMenu>
      @for (child of item().children!; track child.id) {
        <tn-menu-item-renderer [item]="child" />
      }
    </div>
  </ng-template>
}
