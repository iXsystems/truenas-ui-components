<div tnTestIdType="expansion-panel" [ngClass]="classes()" [tnTestId]="testId()">
  <button class="tn-expansion-panel__header"
          type="button"
          tnTestIdType="button"
          [disabled]="disabled()"
          [attr.aria-expanded]="effectiveExpanded()"
          [attr.aria-controls]="contentId"
          [attr.aria-disabled]="disabled()"
          [tnTestId]="toggleTestId()"
          (click)="toggle()">
    @if (title()) {
      <div class="tn-expansion-panel__title">
        {{ title() }}
      </div>
    }
    <ng-content select="[slot=title]" />

    <div class="tn-expansion-panel__indicator">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m6 9 6 6 6-6"/>
      </svg>
    </div>
  </button>

  <!-- `inert` (not aria-hidden) when collapsed: it removes the content from both
       the tab order and the a11y tree, so interactive children aren't keyboard-
       reachable while hidden. aria-hidden alone would leave them focusable, which
       is also an ARIA violation (aria-hidden must not contain focusable elements). -->
  <div class="tn-expansion-panel__content"
       [class.tn-expansion-panel__content--collapsed]="!effectiveExpanded()"
       [id]="contentId"
       [attr.inert]="!effectiveExpanded() ? '' : null">
    <div class="tn-expansion-panel__content-inner">
      <ng-content />
    </div>
  </div>
</div>
