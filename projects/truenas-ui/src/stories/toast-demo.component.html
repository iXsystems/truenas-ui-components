<div style="display: flex; flex-wrap: wrap; gap: 0.75rem;">
  <tn-button label="Info toast" (onClick)="showInfo()" />
  <tn-button label="Success toast" color="primary" (onClick)="showSuccess()" />
  <tn-button label="Warning toast" (onClick)="showWarning()" />
  <tn-button label="Error toast" color="warn" (onClick)="showError()" />
  <tn-button label="With action" variant="outline" (onClick)="showWithAction()" />
</div>
